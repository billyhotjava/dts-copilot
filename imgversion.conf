# ============================================================
# DTS Copilot 镜像版本统一管理
# 说明：所有 Docker 镜像版本在此统一定义，
#       docker-compose.yml 通过 ${IMAGE_XXX} 引用。
#       启动脚本 (start.sh / dev.sh) 自动加载本文件。
# ============================================================

# ======================
# 基础设施
# ======================
IMAGE_POSTGRES=pgvector/pgvector:pg17
IMAGE_TRAEFIK=traefik:v3.5.2

# ======================
# AI / LLM
# ======================
IMAGE_OLLAMA=ollama/ollama:0.18.0

# ======================
# Java 运行时（用于 Dockerfile 基础镜像）
# ======================
IMAGE_JRE=eclipse-temurin:21-jre-alpine
IMAGE_MAVEN=maven:3.9.9-eclipse-temurin-21

# ======================
# 前端构建
# ======================
IMAGE_NODE=node:20-alpine
IMAGE_NGINX=nginx:alpine

# ======================
# 应用镜像
# ======================
COPILOT_RELEASE_VERSION=${COPILOT_RELEASE_VERSION:-v1.0.0-local}
COPILOT_APP_IMAGE_TAG=${COPILOT_APP_IMAGE_TAG:-${COPILOT_RELEASE_VERSION}}
IMAGE_COPILOT_AI=dts-copilot-ai:${COPILOT_APP_IMAGE_TAG}
IMAGE_COPILOT_ANALYTICS=dts-copilot-analytics:${COPILOT_APP_IMAGE_TAG}
IMAGE_COPILOT_WEBAPP=dts-copilot-webapp:${COPILOT_APP_IMAGE_TAG}
