server:
  port: 8091

spring:
  application:
    name: dts-copilot-ai
  datasource:
    url: jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${PG_DB:copilot}?currentSchema=copilot_ai
    username: ${PG_USER:copilot}
    password: ${PG_PASSWORD:copilot_dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: copilot_ai
  liquibase:
    change-log: classpath:config/liquibase/master.xml
    default-schema: copilot_ai

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

dts:
  copilot:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      default-model: ${OLLAMA_DEFAULT_MODEL:qwen2.5-coder:7b}
      timeout-seconds: 60
