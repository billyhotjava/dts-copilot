server:
  port: 8091

spring:
  application:
    name: dts-copilot-ai
  mvc:
    async:
      request-timeout: ${COPILOT_STREAM_ASYNC_TIMEOUT:10m}
  datasource:
    url: jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${PG_DB:copilot}?currentSchema=copilot_ai&searchpath=copilot_ai,public
    username: ${PG_USER:copilot}
    password: ${PG_PASSWORD:copilot_dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: copilot_ai
  liquibase:
    change-log: classpath:config/liquibase/master.xml
    default-schema: copilot_ai

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

dts:
  copilot:
    # 默认 LLM 配置（通过环境变量覆盖，支持公有云和本地）
    llm:
      provider: ${LLM_PROVIDER:deepseek}
      base-url: ${LLM_BASE_URL:https://api.deepseek.com/v1}
      model: ${LLM_MODEL:deepseek-chat}
      api-key: ${LLM_API_KEY:}
      max-tokens: ${LLM_MAX_TOKENS:4096}
      temperature: ${LLM_TEMPERATURE:0.3}
      timeout-seconds: ${LLM_TIMEOUT:60}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      default-model: ${OLLAMA_DEFAULT_MODEL:qwen2.5-coder:7b}
      timeout-seconds: 60
    ai:
      config-path: ${DTS_AI_CONFIG_PATH:/opt/dts/upload/ai-copilot-config.json}

copilot:
  chat:
    planner:
      mode: ${COPILOT_CHAT_PLANNER_MODE:asset}
  admin-secret: ${COPILOT_ADMIN_SECRET:change-me-in-production}
