services:
  copilot-postgres:
    image: pgvector/pgvector:pg16
    container_name: dts-copilot-postgres
    environment:
      POSTGRES_DB: ${PG_DB:-copilot}
      POSTGRES_USER: ${PG_USER:-copilot}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-copilot_dev}
    ports:
      - "5432:5432"
    volumes:
      - copilot-pg-data:/var/lib/postgresql/data
      - ./docker/postgres/init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-copilot} -d ${PG_DB:-copilot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  copilot-ollama:
    image: ollama/ollama:latest
    container_name: dts-copilot-ollama
    ports:
      - "11434:11434"
    volumes:
      - copilot-ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  copilot-ai:
    build:
      context: ./dts-copilot-ai
      dockerfile: Dockerfile
    container_name: dts-copilot-ai
    environment:
      PG_HOST: copilot-postgres
      PG_PORT: "5432"
      PG_DB: ${PG_DB:-copilot}
      PG_USER: ${PG_USER:-copilot}
      PG_PASSWORD: ${PG_PASSWORD:-copilot_dev}
      OLLAMA_BASE_URL: http://copilot-ollama:11434
      COPILOT_ADMIN_SECRET: ${COPILOT_ADMIN_SECRET:-change-me-in-production}
    ports:
      - "${COPILOT_AI_PORT:-8091}:8091"
    depends_on:
      copilot-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8091/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  copilot-analytics:
    build:
      context: ./dts-copilot-analytics
      dockerfile: Dockerfile
    container_name: dts-copilot-analytics
    environment:
      PG_HOST: copilot-postgres
      PG_PORT: "5432"
      PG_DB: ${PG_DB:-copilot}
      PG_USER: ${PG_USER:-copilot}
      PG_PASSWORD: ${PG_PASSWORD:-copilot_dev}
      COPILOT_AI_BASE_URL: http://copilot-ai:8091
    ports:
      - "${COPILOT_ANALYTICS_PORT:-8092}:8092"
    depends_on:
      copilot-postgres:
        condition: service_healthy
      copilot-ai:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8092/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  copilot-proxy:
    image: traefik:v3.3
    container_name: dts-copilot-proxy
    ports:
      - "${TLS_PORT:-443}:443"
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./services/proxy/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./services/proxy/dynamic:/etc/traefik/dynamic:ro
      - ./services/certs/server.crt:/certs/server.crt:ro
      - ./services/certs/server.key:/certs/server.key:ro
    depends_on:
      - copilot-ai
      - copilot-analytics
    restart: unless-stopped

volumes:
  copilot-pg-data:
  copilot-ollama-data:
