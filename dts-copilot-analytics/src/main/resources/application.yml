server:
  port: 8092

spring:
  application:
    name: dts-copilot-analytics
  mvc:
    async:
      request-timeout: ${COPILOT_STREAM_ASYNC_TIMEOUT:10m}
  datasource:
    url: jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${PG_DB:copilot}?currentSchema=copilot_analytics
    username: ${PG_USER:copilot}
    password: ${PG_PASSWORD:copilot_dev}
    driver-class-name: org.postgresql.Driver
  liquibase:
    change-log: classpath:config/liquibase/master.xml
    default-schema: copilot_analytics

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: copilot_analytics
    open-in-view: false

dts:
  copilot:
    ai:
      base-url: ${COPILOT_AI_BASE_URL:http://localhost:8091}
  analytics:
    platform-auth:
      enabled: ${DTS_ANALYTICS_PLATFORM_AUTH_ENABLED:false}
    default-databases:
      - name: "园林业务库"
        role: SYSTEM_RUNTIME
        engine: postgresql
        host: ${BIZ_DB_HOST:localhost}
        port: ${BIZ_DB_PORT:5432}
        db: ${BIZ_DB_NAME:garden}
        user: ${BIZ_DB_USER:readonly}
        password: ${BIZ_DB_PASSWORD:}
        auto-sync-metadata: true
  elt:
    enabled: false
    cron: "0 0 * * * *"
    batch-size: 1000
    business-db:
      url: ${DTS_BIZ_DB_URL:jdbc:mysql://localhost:3306/rs_cloud_flower}
      username: ${DTS_BIZ_DB_USER:root}
      password: ${DTS_BIZ_DB_PASS:}

copilot:
  admin-secret: ${COPILOT_ADMIN_SECRET:change-me-in-production}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized
