http:
  routers:
    copilot-ai:
      rule: "PathPrefix(`/api/ai`)"
      service: copilot-ai
      entryPoints:
        - websecure
      tls: {}
      priority: 20
      middlewares:
        - security-headers

    copilot-analytics-api:
      rule: "PathPrefix(`/api`)"
      service: copilot-analytics
      entryPoints:
        - websecure
      tls: {}
      priority: 10
      middlewares:
        - security-headers

    copilot-webapp:
      rule: "PathPrefix(`/`)"
      service: copilot-webapp
      entryPoints:
        - websecure
      tls: {}
      priority: 1
      middlewares:
        - security-headers

  services:
    copilot-ai:
      loadBalancer:
        servers:
          - url: "http://copilot-ai:8091"

    copilot-analytics:
      loadBalancer:
        servers:
          - url: "http://copilot-analytics:8092"

    copilot-webapp:
      loadBalancer:
        servers:
          - url: "http://copilot-webapp:80"

  middlewares:
    security-headers:
      headers:
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        contentTypeNosniff: true
        browserXssFilter: true
        frameDeny: false
        customFrameOptionsValue: "SAMEORIGIN"

tls:
  certificates:
    - certFile: /certs/server.crt
      keyFile: /certs/server.key

  options:
    default:
      minVersion: VersionTLS12
      sniStrict: false

  stores:
    default:
      defaultCertificate:
        certFile: /certs/server.crt
        keyFile: /certs/server.key
